<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a0c4d8"/>
      <stop offset="50%" stop-color="#7eb8e0"/>
      <stop offset="100%" stop-color="#3b82d4"/>
    </linearGradient>
    <radialGradient id="star-glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#7eb8e0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7eb8e0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background — pure black so corners vanish against dock -->
  <rect width="1024" height="1024" fill="#000000"/>
  <!-- Ambient stars -->
  <circle cx="130" cy="120" r="5" fill="#f0f4ff" opacity="0.35"/>
  <circle cx="890" cy="105" r="4" fill="#f0f4ff" opacity="0.25"/>
  <circle cx="105" cy="860" r="3.5" fill="#f0f4ff" opacity="0.2"/>
  <circle cx="910" cy="900" r="4" fill="#f0f4ff" opacity="0.18"/>
  <circle cx="870" cy="440" r="3" fill="#f0f4ff" opacity="0.12"/>
  <circle cx="195" cy="920" r="2.5" fill="#f0f4ff" opacity="0.1"/>
  <!-- Glow -->
  <circle cx="512" cy="512" r="340" fill="url(#star-glow)"/>
  <!-- Compass star — scaled to fill canvas, tips near edges -->
  <path d="M512 30 L568 440 L994 512 L568 584 L512 994 L456 584 L30 512 L456 440 Z" fill="url(#star-grad)"/>
  <!-- Center -->
  <circle cx="512" cy="512" r="42" fill="#f0f4ff" opacity="0.9"/>
  <circle cx="512" cy="512" r="18" fill="#fff"/>
  <!-- AI sparkle cluster -->
  <path d="M776 230 L787 274 L831 285 L787 296 L776 340 L765 296 L721 285 L765 274 Z" fill="#f0f4ff" opacity="0.45"/>
  <path d="M848 330 L856 358 L884 366 L856 374 L848 402 L840 374 L812 366 L840 358 Z" fill="#f0f4ff" opacity="0.3"/>
</svg>
